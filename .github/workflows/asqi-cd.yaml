name: ASQI Project Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    uses: ./.github/workflows/lint.yaml
  test:
    uses: ./.github/workflows/test.yaml

  security:
    uses: ./.github/workflows/security.yaml

  build-publish-container:
    needs: [ lint, test,  security ]
    permissions:
      packages: write
      id-token: write
      contents: read
      attestations: write
    uses: ./.github/workflows/asqi-container-publish.yaml
    secrets: inherit

  detect-version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [ lint, test, security ]
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: 🔍 Detect version bump
        id: version
        run: |
          set -euo pipefail
          CURR=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          PREV=$(git show HEAD~1:pyproject.toml 2>/dev/null \
            | python3 -c "import sys,tomllib; print(tomllib.load(sys.stdin.buffer)['project']['version'])" 2>/dev/null || echo "")
          if [[ "${CURR}" != "${PREV}" && -n "${CURR}" ]]; then
            if git ls-remote --tags origin "v${CURR}" | grep -q "refs/tags/v${CURR}$"; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "Tag v${CURR} already exists, skipping release"
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
              echo "version=${CURR}" >> "$GITHUB_OUTPUT"
              echo "Version bump detected: ${PREV:-<none>} → ${CURR}"
            fi
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged (${CURR}), skipping release"
          fi

  build-publish-library:
    needs: detect-version
    if: needs.detect-version.outputs.changed == 'true'
    # inlined as pypa publisher does not support reusable workflows yet
    permissions:
      id-token: write
      contents: write
    runs-on: ubuntu-latest
    environment:
      name: pypi
    strategy:
      matrix:
        python-version: [ '3.12' ]
    env:
      VERSION: ${{ needs.detect-version.outputs.version }}
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: 📦 Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: 🐍 Set up uv and Python
        run: |
          uv venv
          source .venv/bin/activate

      - name: 🛠️ Install build dependencies
        run: |
          uv sync --locked --python ${{ matrix.python-version }} --group dev

      - name: 📝 Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --tag v${{ env.VERSION }} --prepend CHANGELOG.md

      - name: 🔨 Build package
        run: uv build --wheel --sdist

      - name: 🔍 Detect uncommitted schema changes
        run: |
          if ! git diff --quiet -- src/asqi/schemas/; then
            echo "=== ❌ Schema files are out-of-date ==="
            git diff --stat -- src/asqi/schemas/
            echo "=== Run and Push ==="
            echo "  uv run scripts/generate_schemas.py"
            exit 1
          fi
          echo "=== Schemas are up-to-date ==="

      - name: 🔍 Verify built version
        run: |
          ls -la dist/
          echo "Built wheel:"
          ls dist/*.whl

      - name: 🧪 Test wheel installation
        run: |
          set -e
          uv venv /tmp/test-wheel-env --python ${{ matrix.python-version }}
          . /tmp/test-wheel-env/bin/activate
          uv pip install dist/*.whl
          asqi --help

      - name: 🚀 Publish to PyPI
        # This action uses OIDC to securely authenticate with PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: 📤 Commit changelog back to main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changelog changes to commit"
          else
            git commit -m "chore(release): asqi-engineer ${VERSION} [skip ci]"
            git push origin main
          fi

      - name: 🏷️ Create git tag
        run: |
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: 📝 Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          awk '/^## /{if(found) exit; found=1; next} found' \
            CHANGELOG.md > notes.md || true
          gh release create "v${VERSION}" \
            --title "asqi-engineer ${VERSION}" \
            --notes-file notes.md \
            dist/*
