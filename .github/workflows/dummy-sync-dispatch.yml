# =============================================================================
# Dummy Sync Dispatch to private monorepo
# =============================================================================
#
# Sends a repository_dispatch event "dummy-sync" to the private monorepo.
#
# Requires:
#   - vars.PRIVATE_MONOREPO_URL  (e.g. https://github.com/org/your-private-monorepo.git)
#   - secrets.GH_APP_ID (GitHub App ID for sync)
#   - secrets.GH_APP_PRIVATE_KEY (GitHub App Private Key for sync)
# =============================================================================

name: Dummy Sync Dispatch

on:
  workflow_dispatch: # Allow manual triggering for testing

jobs:
  dispatch-dummy-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check for secrets
        id: check_secrets
        run: |
          if [ -z "${{ secrets.GH_APP_ID }}" ] || [ -z "${{ secrets.GH_APP_PRIVATE_KEY }}" ]; then
            echo "secrets_available=false" >> $GITHUB_OUTPUT
            echo "::warning::GH_APP_ID or GH_APP_PRIVATE_KEY is missing."
          else
            echo "secrets_available=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate Token
        if: steps.check_secrets.outputs.secrets_available == 'true'
        id: get_workflow_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: "resaro-ai"
          repositories: "resaro-ai-monorepo"

      - name: Send Repository Dispatch
        if: steps.check_secrets.outputs.secrets_available == 'true'
        run: |
          set -euo pipefail
          
          # Extract owner and repo from the URL
          # e.g. https://github.com/resaro-ai/resaro-ai-monorepo.git -> resaro-ai/resaro-ai-monorepo
          REPO_FULL_NAME=$(echo "${{ vars.PRIVATE_MONOREPO_URL }}" | sed -E 's|https://github.com/([^/]+/[^/.]+)(\.git)?|\1|')
          
          echo "Sending 'dummy-sync' dispatch to $REPO_FULL_NAME"
          
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/$REPO_FULL_NAME/dispatches" \
            -f "event_type=dummy-sync" \
            -f "client_payload[ref]=${{ github.ref }}" \
            -f "client_payload[sha]=${{ github.sha }}"
        env:
          GH_TOKEN: ${{ steps.get_workflow_token.outputs.token }}
