# RBAC manifests for KubernetesBackend
#
# This file is packaged inside the asqi-engineer wheel at asqi/k8s/rbac.yaml.
# Apply with:
#   kubectl apply -f "$(python -c 'from importlib.resources import files; print(files("asqi").joinpath("k8s/rbac.yaml"))')" -n <your-namespace>
#
# The ServiceAccount "asqi-engineer" is granted the minimum permissions
# required by KubernetesBackend:
#   - batch/v1 Jobs:        create, get, watch, delete, list
#   - core/v1 Pods:         get, list  (for log collection and exit-code inspection)
#   - core/v1 Pods/log:     get
#   - core/v1 ConfigMaps:   create, delete  (per-Job io-refs ConfigMap for the
#                                            AIP Runtime sidecar; AIP-2473)
#
# Update the `namespace` fields to match your deployment namespace.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: asqi-engineer
  namespace: default
  labels:
    app: asqi-engineer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: asqi-engineer-job-manager
  namespace: default
  labels:
    app: asqi-engineer
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "watch", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: asqi-engineer-job-manager-binding
  namespace: default
  labels:
    app: asqi-engineer
subjects:
  - kind: ServiceAccount
    name: asqi-engineer
    namespace: default
roleRef:
  kind: Role
  name: asqi-engineer-job-manager
  apiGroup: rbac.authorization.k8s.io
